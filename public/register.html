<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PharmaCare - Register</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <style>
    body { background: linear-gradient(135deg, #1a8f4e 0%, #0d5c32 100%); min-height: 100vh; display: flex; align-items: center; padding: 20px 0; }
    .card { border: none; border-radius: 16px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
    .brand-icon { width: 60px; height: 60px; background: linear-gradient(135deg, #1a8f4e, #0d5c32); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 15px; }
    .btn-success { background: linear-gradient(135deg, #1a8f4e, #0d5c32); border: none; padding: 12px; border-radius: 8px; font-weight: 600; }
    .form-control:focus, .form-select:focus { border-color: #1a8f4e; box-shadow: 0 0 0 0.2rem rgba(26,143,78,0.25); }
    .alert { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-6">
        <div class="card p-4">
          <div class="text-center mb-3">
            <div class="brand-icon"><i class="fas fa-pills fa-2x text-white"></i></div>
            <h4 class="fw-bold text-success">Create Account</h4>
            <p class="text-muted small">Join PharmaCare today</p>
          </div>
          <div id="alert" class="alert"></div>
          <div class="row g-3">
            <div class="col-12">
              <label class="form-label fw-semibold">Full Name</label>
              <input type="text" id="name" class="form-control" placeholder="Enter full name">
            </div>
            <div class="col-12">
              <label class="form-label fw-semibold">Email Address</label>
              <input type="email" id="email" class="form-control" placeholder="Enter email">
            </div>
            <div class="col-12">
              <label class="form-label fw-semibold">Password</label>
              <input type="password" id="password" class="form-control" placeholder="Min 6 characters">
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold">Phone</label>
              <input type="text" id="phone" class="form-control" placeholder="Phone number">
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold">Role</label>
              <select id="role" class="form-select">
                <option value="customer">Customer</option>
                <option value="pharmacist">Pharmacist</option>
                <option value="admin">Admin</option>
              </select>
            </div>
            <div class="col-12">
              <label class="form-label fw-semibold">Address</label>
              <textarea id="address" class="form-control" rows="2" placeholder="Enter address"></textarea>
            </div>
            <div class="col-12">
              <button onclick="register()" class="btn btn-success w-100">
                <i class="fas fa-user-plus me-2"></i>Register
              </button>
            </div>
            <div class="col-12 text-center">
              <span class="text-muted">Already have an account? </span>
              <a href="/login.html" class="text-success fw-semibold">Login here</a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script>
    async function register() {
      const alert = document.getElementById('alert');
      const body = {
        name: document.getElementById('name').value,
        email: document.getElementById('email').value,
        password: document.getElementById('password').value,
        phone: document.getElementById('phone').value,
        role: document.getElementById('role').value,
        address: document.getElementById('address').value,
      };
      alert.style.display = 'none';
      try {
        const res = await fetch('/api/auth/register', {
          method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body)
        });
        const data = await res.json();
        if (!res.ok) { alert.className = 'alert alert-danger'; alert.textContent = data.message; alert.style.display = 'block'; return; }
        alert.className = 'alert alert-success'; alert.textContent = 'Registered successfully! Redirecting...'; alert.style.display = 'block';
        localStorage.setItem('token', data.token); localStorage.setItem('user', JSON.stringify(data.user));
        setTimeout(() => {
          const role = data.user.role;
          if (role === 'admin') window.location.href = '/admin';
          else if (role === 'pharmacist') window.location.href = '/pharmacist';
          else window.location.href = '/customer';
        }, 1500);
      } catch (e) { alert.className = 'alert alert-danger'; alert.textContent = 'Server error.'; alert.style.display = 'block'; }
    }
  </script>
</body>
</html>
