<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PharmaCare - Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <style>
    body { background: linear-gradient(135deg, #1a8f4e 0%, #0d5c32 100%); min-height: 100vh; display: flex; align-items: center; }
    .card { border: none; border-radius: 16px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
    .brand-icon { width: 70px; height: 70px; background: linear-gradient(135deg, #1a8f4e, #0d5c32); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; }
    .btn-primary { background: linear-gradient(135deg, #1a8f4e, #0d5c32); border: none; padding: 12px; border-radius: 8px; font-weight: 600; }
    .btn-primary:hover { background: linear-gradient(135deg, #0d5c32, #1a8f4e); }
    .form-control:focus { border-color: #1a8f4e; box-shadow: 0 0 0 0.2rem rgba(26,143,78,0.25); }
    .alert { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-5">
        <div class="card p-4">
          <div class="text-center mb-3">
            <div class="brand-icon"><i class="fas fa-pills fa-2x text-white"></i></div>
            <h3 class="fw-bold text-success">PharmaCare</h3>
            <p class="text-muted">Digital Pharmacy Management System</p>
          </div>
          <div id="alert" class="alert alert-danger"></div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Email Address</label>
            <div class="input-group">
              <span class="input-group-text"><i class="fas fa-envelope text-success"></i></span>
              <input type="email" id="email" class="form-control" placeholder="Enter your email">
            </div>
          </div>
          <div class="mb-4">
            <label class="form-label fw-semibold">Password</label>
            <div class="input-group">
              <span class="input-group-text"><i class="fas fa-lock text-success"></i></span>
              <input type="password" id="password" class="form-control" placeholder="Enter your password">
            </div>
          </div>
          <button onclick="login()" class="btn btn-primary w-100 mb-3">
            <i class="fas fa-sign-in-alt me-2"></i>Login
          </button>
          <div class="text-center">
            <span class="text-muted">Don't have an account? </span>
            <a href="register.html" class="text-success fw-semibold">Register here</a>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script>
    async function login() {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const alert = document.getElementById('alert');
      alert.style.display = 'none';
      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        if (!res.ok) { alert.textContent = data.message; alert.style.display = 'block'; return; }
        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify(data.user));
        const role = data.user.role;
        if (role === 'admin') window.location.href = '/admin';
        else if (role === 'pharmacist') window.location.href = '/pharmacist';
        else window.location.href = '/customer';
      } catch (e) { alert.textContent = 'Server error. Please try again.'; alert.style.display = 'block'; }
    }
    document.addEventListener('keypress', e => { if (e.key === 'Enter') login(); });
  </script>
</body>
</html>
